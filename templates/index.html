<!DOCTYPE html>
<html>
<head>
    <title>BioSense Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="background:#0f172a; color:white; font-family:sans-serif; text-align:center;">

<h1 style="color:#38bdf8;">🧠 BioSense</h1>

<h2 id="state" style="font-size:42px; font-weight:bold;">Stopped</h2>

<h3 id="values" style="margin-bottom:20px;">Alpha: 0 | Beta: 0</h3>

<canvas id="chart" width="400" height="200"></canvas>

<script>
let labels = [];
let alphaData = [];
let betaData = [];

// 🔥 IMPORTANT: use this flag properly
let isRunning = false;

const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: labels,
        datasets: [
            {
                label: 'Alpha',
                data: alphaData,
                borderColor: 'cyan',
                borderWidth: 2,
                tension: 0.4
            },
            {
                label: 'Beta',
                data: betaData,
                borderColor: 'red',
                borderWidth: 2,
                tension: 0.4
            }
        ]
    },
    options: {
        animation: false,
        plugins: {
            legend: {
                labels: { color: 'white' }
            }
        },
        scales: {
            x: { display: false },
            y: { ticks: { color: 'white' } }
        }
    }
});

// 🔁 LIVE UPDATE
setInterval(() => {
    fetch('/data')
        .then(res => res.json())
        .then(data => {

            let stateEl = document.getElementById("state");
            let valueEl = document.getElementById("values");

            // ✅ SHOW VALUES ALWAYS
            valueEl.innerText = `Alpha: ${data.alpha} | Beta: ${data.beta}`;

            // 🎯 STATE HANDLING
            if (data.state === "Running") {
                stateEl.innerText = "MONITORING...";
                stateEl.style.color = "yellow";
                isRunning = true;
            }
            else if (data.state === "Stress") {
                stateEl.innerText = "STRESS";
                stateEl.style.color = "red";
                isRunning = false;
            }
            else if (data.state === "Relax") {
                stateEl.innerText = "RELAX";
                stateEl.style.color = "lightgreen";
                isRunning = false;
            }
            else {
                stateEl.innerText = "STOPPED";
                stateEl.style.color = "gray";
                isRunning = false;
            }

            // 📊 ONLY MOVE GRAPH WHEN RUNNING
            if (isRunning) {
                labels.push(labels.length);
                alphaData.push(data.alpha);
                betaData.push(data.beta);

                if (labels.length > 20) {
                    labels.shift();
                    alphaData.shift();
                    betaData.shift();
                }

                chart.update();
            }
        });

}, 1000);
</script>

</body>
</html>
